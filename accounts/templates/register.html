{% extends 'base.html' %}

{% block content %}

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .container {
          min-height: calc(10vh - 12px);
        width: 400px;
        margin: 50px auto;
        margin-top: 150px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.966);
         
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #000000f1;
    }

    label {
        display: block;
        margin-top: 10px;
        margin-bottom: 5px;
        font-weight: bold;
        color: rgba(0, 0, 0, 0.788);
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }

    input[type="submit"] {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #0d6efd;
        color: white;
        cursor: pointer;
        font-size: 15px;
    }

    input[type="submit"]:hover {
        background: #0b5ed7;
    }

    /* ── FIX 1: Alag-alag colors success aur error ke liye ── */
    .message-card {
        padding: 10px 14px;
        border-radius: 5px;
        margin-bottom: 16px;      /* FIX 2: form ke upar dikhega */
    }

    .message-card.success {
        background: #e8f5e9;
        border: 1px solid #4caf50;
    }

    .message-card.error {
        background: #fdecea;
        border: 1px solid #f44336;
    }

    .message {
        display: block;
        font-size: 14px;
    }

    .message-card.success .message { color: #2e7d32; }   /* green */
    .message-card.error   .message { color: #c62828; }   /* red   */

    .login-link {
        text-align: center;
        margin-top: 14px;
        font-size: 14px;
        color:rgba(0, 0, 0, 0.568)
    }

    .login-link a {
        color: #0d6efd;
        font-weight: bold;
        text-decoration: none;
    }
</style>

<div class="container">
    <h2>User Registration</h2>

    <!-- FIX 2: Messages form ke UPAR moved — user turant dekh sake -->
    {% if messages %}
        {% for message in messages %}
            <div class="message-card {{ message.tags }}">
                <!--
                    message.tags automatically "success" ya "error" class
                    add karta hai, jo humne CSS mein define kiya hai.
                    views.py mein messages.success() → "success" class
                                  messages.error()   → "error"   class
                -->
                <span class="message">{{ message }}</span>
            </div>
        {% endfor %}
    {% endif %}



    <form action="{% url 'register' %}" method="POST">
        {% csrf_token %}

        <label for="username">User Name</label>
        <input type="text" id="username" name="username">

        <label for="email">Email</label>
        <input type="email" id="email" name="email">

        <label for="password">Password</label>
        <input type="password" id="password" name="password">

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password">

        <input type="submit" value="Register">
    </form>

    <div class="login-link">
        Already have an account? <a href="{% url 'login' %}"> Sign In</a><br>
    <a href="/">  back to home</a>
    </div>
</div>

{% endblock %}
