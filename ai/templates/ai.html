<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Text Generator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:white;
        }

        .container{
            width:90%;
            max-width:900px;
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#38bdf8;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        textarea{
            width:100%;
            min-height:180px;
            resize:vertical;
            padding:15px;
            border:none;
            border-radius:10px;
            outline:none;
            background:#334155;
            color:white;
            font-size:16px;
        }

        textarea::placeholder{
            color:#cbd5e1;
        }

        button{
            width:200px;
            align-self:center;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#0ea5e9;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0284c7;
            transform:scale(1.03);
        }

        .result{
            margin-top:35px;
            background:#334155;
            padding:20px;
            border-radius:10px;
        }

        .result h2{
            color:#38bdf8;
            margin-bottom:15px;
        }

        .prompt{
            margin-bottom:20px;
        }

        .response{
            white-space:pre-wrap;
            line-height:1.7;
            color:#f1f5f9;
        }

        @media(max-width:768px){

            .container{
                width:95%;
                padding:20px;
            }

            button{
                width:100%;
            }

        }
    </style>

</head>
<body>

<div class="container">

    <h1>Gemini AI Text Generator</h1>

    <form method="POST">
        {% csrf_token %}

        <textarea
            name="prompt"
            placeholder="Enter your prompt here..."
        >{{ prompt }}</textarea>

        <button type="submit">
            Generate
        </button>

    </form>

    {% if response %}

    <div class="result">

        <h2>Your Prompt</h2>

        <div class="prompt">
            {{ prompt }}
        </div>

        <hr style="margin:20px 0; border-color:#475569;">

        <h2>AI Response</h2>

        <div class="response">
            {{ response }}
        </div>

    </div>

    {% endif %}

</div>

</body>
</html>
