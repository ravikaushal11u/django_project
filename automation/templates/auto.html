<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Automation Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:30px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:25px;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
}

input,
textarea,
select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:16px;
    outline:none;
}

textarea{
    min-height:180px;
    resize:vertical;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0ea5e9;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0284c7;
}

.history{
    margin-top:30px;
}

.history-item{
    background:#334155;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}

.history-item h3{
    color:#38bdf8;
    margin-bottom:10px;
}

.status{
    display:inline-block;
    padding:5px 12px;
    background:#22c55e;
    border-radius:20px;
    font-size:14px;
    margin-top:10px;
}

@media(max-width:768px){

.container{
    width:95%;
}

}
</style>

</head>
<body>

<div class="container">

<h1>🤖 AI Automation Dashboard</h1>

<div class="card">

<form method="POST">
{% csrf_token %}

<div class="input-group">
<label>Automation Name</label>
<input type="text" name="title" placeholder="Example: Blog Generator">
</div>

<div class="input-group">
<label>AI Model</label>

<select name="model">
<option>Gemini 2.5 Flash</option>
<option>Gemini 2.5 Flash Lite</option>
<option>Gemini 2.5 Pro</option>
</select>

</div>

<div class="input-group">
<label>Prompt</label>

<textarea
name="prompt"
placeholder="Write your automation prompt here..."></textarea>

</div>

<button type="submit">
▶ Run Automation
</button>

</form>

</div>

<div class="card history">

<h2 style="margin-bottom:20px;">Automation History</h2>

<div class="history-item">

<h3>Blog Generator</h3>

<p>
Write a blog on Artificial Intelligence.
</p>

<span class="status">
Completed
</span>

</div>

<div class="history-item">

<h3>Email Writer</h3>

<p>
Generate a professional client email.
</p>

<span class="status">
Completed
</span>

</div>

</div>

</div>

</body>
</html>
